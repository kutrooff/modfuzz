openapi: 3.0.3
info:
  title: ModFuzz Demo Microservices API
  version: 2.0.0
  description: Demo API for stateful fuzzing of related microservice domains.

servers:
  - url: http://127.0.0.1:8000

tags:
  - name: identity-service
  - name: catalog-service
  - name: inventory-service
  - name: orders-service
  - name: payments-service
  - name: shipments-service

paths:
  /health:
    get:
      tags: [system]
      summary: Health check
      operationId: health
      responses:
        "200":
          description: API is available
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  services:
                    type: array
                    items:
                      type: string
              example:
                status: ok
                services: [identity, catalog, inventory, orders, payments, shipments]

  /auth/login:
    post:
      tags: [identity-service]
      summary: Login and issue demo token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              username: admin
              password: admin
      responses:
        "200":
          description: Auth token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
              example:
                access_token: demo-token-admin
                token: demo-token-admin
                userId: 1
                role: admin
        "401":
          description: Invalid credentials
        "423":
          description: Account is locked
        "422":
          description: Validation error

  /users:
    post:
      tags: [identity-service]
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
            example:
              name: Alice
              email: alice@example.com
              role: customer
      responses:
        "201":
          description: User created
          headers:
            Location:
              description: URL of created user
              schema:
                type: string
              example: /users/2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 2
                name: Alice
                email: alice@example.com
                role: customer
        "422":
          description: Validation error

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
        example: 1
    get:
      tags: [identity-service]
      summary: Get user by id
      operationId: getUser
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 1
                name: Seed User
                email: seed@example.com
                role: customer
        "404":
          description: User not found
        "422":
          description: Validation error
    patch:
      tags: [identity-service]
      summary: Update user
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
            example:
              name: Alice Updated
              email: alice.updated@example.com
              role: customer
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
        "422":
          description: Validation error
    delete:
      tags: [identity-service]
      summary: Delete user
      operationId: deleteUser
      responses:
        "204":
          description: User deleted
        "404":
          description: User not found
        "422":
          description: Validation error

  /products:
    post:
      tags: [catalog-service]
      summary: Create product
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
            example:
              name: Keyboard
              sku: KB-001
              price: 79.9
              stock: 5
      responses:
        "201":
          description: Product created
          headers:
            Location:
              description: URL of created product
              schema:
                type: string
              example: /products/2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "409":
          description: Duplicate SKU
        "422":
          description: Validation error

  /products/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
        example: 1
    get:
      tags: [catalog-service]
      summary: Get product by id
      operationId: getProduct
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
        "422":
          description: Validation error
    patch:
      tags: [catalog-service]
      summary: Update product
      operationId: updateProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
            example:
              name: Mechanical Keyboard
              price: 89.9
              active: true
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
        "422":
          description: Validation error
    delete:
      tags: [catalog-service]
      summary: Delete product
      operationId: deleteProduct
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Product deleted
        "404":
          description: Product not found
        "409":
          description: Product is referenced by orders
        "422":
          description: Validation error

  /inventory/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
        example: 1
    get:
      tags: [inventory-service]
      summary: Get inventory item by product id
      operationId: getInventory
      responses:
        "200":
          description: Inventory item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          description: Inventory item not found
        "422":
          description: Validation error
    patch:
      tags: [inventory-service]
      summary: Update inventory item
      operationId: updateInventory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryUpdate"
            example:
              stock: 20
              reserved: 0
      responses:
        "200":
          description: Inventory item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          description: Inventory item not found
        "422":
          description: Validation error

  /orders:
    post:
      tags: [orders-service]
      summary: Create order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
            example:
              userId: 1
              productId: 1
              quantity: 1
              promoCode: SPRING
      responses:
        "201":
          description: Order created
          headers:
            Location:
              description: URL of created order
              schema:
                type: string
              example: /orders/1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: User or product not found
        "409":
          description: Not enough stock
        "422":
          description: Validation error

  /orders/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: integer
        example: 1
    get:
      tags: [orders-service]
      summary: Get order by id
      operationId: getOrder
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
        "422":
          description: Validation error
    patch:
      tags: [orders-service]
      summary: Update order
      operationId: updateOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
            example:
              status: processing
              quantity: 1
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
        "422":
          description: Validation error
    delete:
      tags: [orders-service]
      summary: Cancel order
      operationId: cancelOrder
      responses:
        "204":
          description: Order cancelled
        "404":
          description: Order not found
        "422":
          description: Validation error

  /payments:
    post:
      tags: [payments-service]
      summary: Create payment for order
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCreate"
            example:
              orderId: 1
              amount: 79.9
              method: card
      responses:
        "201":
          description: Payment created
          headers:
            Location:
              description: URL of created payment
              schema:
                type: string
              example: /payments/1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "402":
          description: Card declined
        "404":
          description: Order not found
        "422":
          description: Validation error

  /payments/{paymentId}:
    get:
      tags: [payments-service]
      summary: Get payment by id
      operationId: getPayment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Payment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: Payment not found
        "422":
          description: Validation error

  /shipments:
    post:
      tags: [shipments-service]
      summary: Create shipment for paid order
      operationId: createShipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipmentCreate"
            example:
              orderId: 1
              address: 10 Test Street
      responses:
        "201":
          description: Shipment created
          headers:
            Location:
              description: URL of created shipment
              schema:
                type: string
              example: /shipments/1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "404":
          description: Order not found
        "409":
          description: Order must be paid before shipment
        "422":
          description: Validation error

  /shipments/{shipmentId}:
    parameters:
      - name: shipmentId
        in: path
        required: true
        schema:
          type: integer
        example: 1
    get:
      tags: [shipments-service]
      summary: Get shipment by id
      operationId: getShipment
      responses:
        "200":
          description: Shipment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "404":
          description: Shipment not found
        "422":
          description: Validation error
    patch:
      tags: [shipments-service]
      summary: Update shipment
      operationId: updateShipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipmentUpdate"
            example:
              status: in_transit
              address: 11 Test Street
      responses:
        "200":
          description: Shipment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "404":
          description: Shipment not found
        "422":
          description: Validation error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin

    AuthToken:
      type: object
      required: [access_token, token, userId, role]
      properties:
        access_token:
          type: string
          example: demo-token-admin
        token:
          type: string
          example: demo-token-admin
        userId:
          type: integer
          example: 1
        role:
          type: string
          example: admin

    UserCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Alice
        email:
          type: string
          nullable: true
          example: alice@example.com
        role:
          type: string
          example: customer

    UserUpdate:
      type: object
      properties:
        name:
          type: string
          nullable: true
          example: Alice Updated
        email:
          type: string
          nullable: true
          example: alice.updated@example.com
        role:
          type: string
          nullable: true
          example: customer

    User:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Alice
        email:
          type: string
          nullable: true
          example: alice@example.com
        role:
          type: string
          example: customer

    ProductCreate:
      type: object
      required: [name, sku, price]
      properties:
        name:
          type: string
          example: Keyboard
        sku:
          type: string
          example: KB-001
        price:
          type: number
          format: float
          example: 79.9
        stock:
          type: integer
          example: 5

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          nullable: true
          example: Mechanical Keyboard
        sku:
          type: string
          nullable: true
          example: KB-002
        price:
          type: number
          format: float
          nullable: true
          example: 89.9
        active:
          type: boolean
          nullable: true
          example: true

    Product:
      type: object
      required: [id, name, sku, price, active]
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Keyboard
        sku:
          type: string
          example: KB-001
        price:
          type: number
          format: float
          example: 79.9
        active:
          type: boolean
          example: true

    InventoryUpdate:
      type: object
      properties:
        stock:
          type: integer
          example: 20
        reserved:
          type: integer
          example: 0

    InventoryItem:
      type: object
      required: [productId, stock, reserved]
      properties:
        productId:
          type: integer
          example: 1
        stock:
          type: integer
          example: 10
        reserved:
          type: integer
          example: 0

    OrderCreate:
      type: object
      required: [userId, productId, quantity]
      properties:
        userId:
          type: integer
          example: 1
        productId:
          type: integer
          example: 1
        quantity:
          type: integer
          example: 1
        promoCode:
          type: string
          nullable: true
          example: SPRING

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
          nullable: true
          example: processing
        quantity:
          type: integer
          nullable: true
          example: 1

    Order:
      type: object
      required: [id, userId, productId, quantity, status, total]
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        productId:
          type: integer
          example: 1
        quantity:
          type: integer
          example: 1
        status:
          type: string
          example: created
        total:
          type: number
          format: float
          example: 999.0
        promoCode:
          type: string
          nullable: true
          example: SPRING

    PaymentCreate:
      type: object
      required: [orderId, amount, method]
      properties:
        orderId:
          type: integer
          example: 1
        amount:
          type: number
          format: float
          example: 79.9
        method:
          type: string
          example: card

    Payment:
      type: object
      required: [id, orderId, amount, method, status, transactionId]
      properties:
        id:
          type: integer
          example: 1
        orderId:
          type: integer
          example: 1
        amount:
          type: number
          format: float
          example: 999.0
        method:
          type: string
          example: card
        status:
          type: string
          example: paid
        transactionId:
          type: string
          example: tx-000001

    ShipmentCreate:
      type: object
      required: [orderId, address]
      properties:
        orderId:
          type: integer
          example: 1
        address:
          type: string
          example: 10 Test Street

    ShipmentUpdate:
      type: object
      properties:
        status:
          type: string
          nullable: true
          example: in_transit
        address:
          type: string
          nullable: true
          example: 11 Test Street

    Shipment:
      type: object
      required: [id, orderId, address, status, trackingNumber]
      properties:
        id:
          type: integer
          example: 1
        orderId:
          type: integer
          example: 1
        address:
          type: string
          example: 10 Test Street
        status:
          type: string
          example: created
        trackingNumber:
          type: string
          example: TRK-000001
